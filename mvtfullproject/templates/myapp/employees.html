<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Employees</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="{%url 'addemp'%}" class="btn btn-sm btn-primary mt-5">ADD</a>
        <div class="row d-flex justify-content-center mt-2">
            <div class="col-md-8">
                {%if employees%}
                    <table class="table table-bordered table-striped table-hover text-center">
                        <thead>
                            <tr>
                                <th class="bg-primary text-white">Employee ID</th>
                                <th class="bg-primary text-white">Employee Name</th>
                                <th class="bg-primary text-white">Employee Salary</th>
                                <th class="bg-primary text-white">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {%for emp in employees%}
                                <tr>
                                    <td>{{emp.EmployeeId}}</td>
                                    <td>{{emp.EmployeeName}}</td>
                                    <td>{{emp.EmployeeSalary}}</td>
                                    <td class="text-primary">Find | Edit | Delete</td>
                                </tr>
                            {%endfor%}
                        </tbody>
                    </table>
                {%else%}
                    <p class="h1 text-center text-danger">Records Not Found</p>
                {%endif%}
            </div>
        </div>
    </div>
</body>
</html>
