<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>ShowProducts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
          <div class="container">
            <div class="row mt-5">
                <div class="col">
                    <a href="/" class="btn btn-sm btn-outline-primary">Create</a>
                    {% if products %}
                        <table class="table table-bordered table-hover table-striped text-center">
                            <thead>
                                <tr>
                                    <th class="bg-primary text-white">Product ID</th>
                                    <th class="bg-primary text-white">Product Name</th>
                                    <th class="bg-primary text-white">Product Price</th>
                                </tr>
                            </thead>
                            <tbody>
                                {%for product in products%}
                                    <tr>
                                        <td>{{product.ProductId}}</td>
                                        <td>{{product.ProductName}}</td>
                                        <td>{{product.ProductPrice}}</td>
                                    </tr>
                                {%endfor%}
                            </tbody>
                        </table>
                    {%else%}
                    <p class="h2 text-center text-danger">Products Not Found</p>
                    {%endif%}
                </div>
            </div>
          </div>
</body>
</html>
